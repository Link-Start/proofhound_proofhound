packages:
  - .
  - apps/*
  - packages/*
  # Branch-development worktrees live at repo root (see AGENTS.md → Git workflow);
  # never treat a nested checkout there as a workspace package.
  - '!worktrees'
  - '!worktrees/**'
allowBuilds:
  '@nestjs/core': true
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
