name: release

# Release pipeline:
# - Every push to master keeps the release-please Release PR up to date (prepare).
# - Merging the Release PR automatically runs the full publish checks (checks)
#   and then waits for the npm-production environment approval (publish) —
#   approving that deployment is the only manual step of a release.
# - workflow_dispatch stays available as a recovery path: prepare re-runs
#   release-please, dry_run runs the checks alone, publish runs checks + publish.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      mode:
        description: prepare = update the Release PR, dry_run = run publish checks only, publish = checks + npm publish + GitHub Release.
        required: true
        default: dry_run
        type: choice
        options:
          - prepare
          - dry_run
          - publish
      version:
        description: Optional exact version guard for dry_run/publish, for example 0.1.7. Ignored for prepare.
        required: false
        type: string
      dist_tag:
        description: npm dist-tag for publish mode. Ignored for prepare/dry_run.
        required: false
        default: latest
        type: string

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      prepare: ${{ steps.plan.outputs.prepare }}
      check: ${{ steps.plan.outputs.check }}
      publish: ${{ steps.plan.outputs.publish }}
      version: ${{ steps.plan.outputs.version }}
      dist_tag: ${{ steps.plan.outputs.dist_tag }}
    steps:
      - name: Decide pipeline stages
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          MODE: ${{ inputs.mode }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DIST_TAG: ${{ inputs.dist_tag }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "$REF_NAME" != "master" ]; then
            echo "Release workflow must run on master, not $REF_NAME"
            exit 1
          fi

          prepare=false
          check=false
          publish=false
          version=""
          dist_tag="latest"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
            dist_tag="${INPUT_DIST_TAG:-latest}"
            case "$MODE" in
              prepare) prepare=true ;;
              dry_run) check=true ;;
              publish)
                check=true
                publish=true
                ;;
              *)
                echo "Unknown mode: $MODE"
                exit 1
                ;;
            esac
          else
            prepare=true
            # A push of the merged Release PR starts the publish pipeline.
            # release-please titles: "chore(master): release proofhound 0.1.6"
            # (legacy, with component) and "chore(master): release 0.1.7"
            # (include-component-in-tag: false).
            first_line="${HEAD_COMMIT_MESSAGE%%$'\n'*}"
            release_pattern='^chore\(master\): release (proofhound )?([0-9]+\.[0-9]+\.[0-9]+)( \(#[0-9]+\))?$'
            if [[ "$first_line" =~ $release_pattern ]]; then
              check=true
              publish=true
              version="${BASH_REMATCH[2]}"
            fi
          fi

          {
            echo "prepare=$prepare"
            echo "check=$check"
            echo "publish=$publish"
            echo "version=$version"
            echo "dist_tag=$dist_tag"
          } >> "$GITHUB_OUTPUT"
          echo "prepare=$prepare check=$check publish=$publish version=${version:-<from package.json>} dist_tag=$dist_tag"

  prepare:
    needs: plan
    if: needs.plan.outputs.prepare == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: release-prepare
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  checks:
    needs: plan
    if: needs.plan.outputs.check == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: release-checks
      cancel-in-progress: false
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile
      - name: Resolve release version
        id: release_version
        env:
          PLAN_VERSION: ${{ needs.plan.outputs.version }}
        run: |
          if [ -n "$PLAN_VERSION" ]; then
            VERSION="$(pnpm --silent run packages:version:check -- "$PLAN_VERSION")"
          else
            VERSION="$(pnpm --silent run packages:version:check)"
          fi
          pnpm --silent run packages:release:check -- "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Fail before the expensive steps (and before the approval gate) when the
      # version cannot be released anymore.
      - name: Check npm version is unpublished
        if: needs.plan.outputs.publish == 'true'
        run: pnpm run packages:publish:check -- "${{ steps.release_version.outputs.version }}" "https://registry.npmjs.org/"
      - name: Check GitHub release tag is unused
        if: needs.plan.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists"
            exit 1
          fi
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "GitHub Release v${VERSION} already exists"
            exit 1
          fi

      - name: Start test summary
        run: echo "### Unit tests by package" >> "$GITHUB_STEP_SUMMARY"
      - run: pnpm run verify
      - run: pnpm run build
      - run: pnpm run packages:pack:check
      - run: pnpm run packages:pack
      - run: pnpm run packages:consumer:tarball -- "${{ steps.release_version.outputs.version }}"

      # The publish job releases exactly these checked tarballs.
      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: .npm-packages
          retention-days: 7
          if-no-files-found: error

  publish:
    needs: [plan, checks]
    if: needs.plan.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-production
    concurrency:
      group: release-publish
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@^11.5.1

      # The release scripts only use the Node.js standard library plus the
      # npm/pnpm CLIs, so this job publishes the tarballs packed by the checks
      # job without reinstalling or rebuilding the workspace.
      - name: Re-check release state on the publish commit
        run: |
          VERSION="$(pnpm --silent run packages:version:check -- "${{ needs.checks.outputs.version }}")"
          pnpm --silent run packages:release:check -- "$VERSION"
      - name: Check npm version is unpublished
        run: pnpm run packages:publish:check -- "${{ needs.checks.outputs.version }}" "https://registry.npmjs.org/"
      - name: Check GitHub release tag is unused
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.checks.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists"
            exit 1
          fi
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "GitHub Release v${VERSION} already exists"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: .npm-packages

      - name: Publish packed packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm run packages:publish:packed -- .npm-packages "${{ needs.plan.outputs.dist_tag }}"
      - run: pnpm run packages:consumer:registry -- "${{ needs.checks.outputs.version }}" "https://registry.npmjs.org/"
      - run: pnpm run packages:release-notes -- "${{ needs.checks.outputs.version }}" "${{ needs.plan.outputs.dist_tag }}" .npm-packages/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.checks.outputs.version }}"
          gh release create "v${VERSION}" \
            --target "$GITHUB_SHA" \
            --title "ProofHound OSS v${VERSION}" \
            --notes-file .npm-packages/release-notes.md
