name: test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Unit / lint / typecheck / circular-deps / terminology gate (mirrors `pnpm run verify`).
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start test summary
        run: echo "### Unit tests by package" >> "$GITHUB_STEP_SUMMARY"
      - run: pnpm run verify
      - run: pnpm run build
      - run: pnpm run packages:pack:check

  # Real Redis coverage for Lua scripts and the LLM pending/ready admission dispatcher.
  redis-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run limiter Redis integration tests
        env:
          REDIS_TEST_URL: redis://localhost:6379/15
        run: pnpm --filter @proofhound/limiter test:integration

      - name: Run LLM admission Redis integration tests
        env:
          REDIS_TEST_URL: redis://localhost:6379/14
        run: pnpm --filter @proofhound/core exec vitest run --config ./vitest.integration.config.ts src/shared/llm-admission/__tests__/llm-admission.store.integration.spec.ts

  # Functional end-to-end suite against a real server/worker/webhook + ephemeral Postgres/Redis,
  # with the LLM faked (Playwright starts the fake server + the web dev server itself).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: proofhound
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Match the validated local dev behavior (LOCAL_ACTOR fallback, CORS origin, etc.).
      NODE_ENV: development
      LOG_LEVEL: info
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/proofhound
      REDIS_URL: redis://localhost:6379
      # Test-only throwaway secrets (NOT real). base64 of 32 bytes for the model-key encryption.
      MODEL_API_KEY_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      SERVER_PORT: '4000'
      WEB_PUBLIC_URL: http://localhost:3000
      NEXT_PUBLIC_SERVER_URL: http://localhost:4000
      WEBHOOK_BODY_LIMIT: 1mb
      WORKER_CONCURRENCY: '16'
      RELEASE_RUNNER_SCAN_INTERVAL_MS: '2000'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @proofhound/web exec playwright install --with-deps chromium

      - name: Run e2e suite
        run: pnpm --filter @proofhound/web test:e2e

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "===== server ====="; tail -n 200 /tmp/proofhound-e2e-server.log  || true
          echo "===== webhook ====="; tail -n 200 /tmp/proofhound-e2e-webhook.log || true
          echo "===== worker ====="; tail -n 200 /tmp/proofhound-e2e-worker.log  || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7
